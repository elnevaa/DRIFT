<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKYO DRIFT</title>
    <link rel="stylesheet" href="buying.css">
</head>
<body>
    <form action = "ty.html" method = "get">
    <div class="container">
        <h1>Tokyo Drift Acquisition Request
        </h1>
        <form action="#" method="post">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="name">Address:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="name">Email:</label>
                <input type="email" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="name">Contact:</label>
                <input type="tel" id="name" name="name" required>
            </div>
            

            <button type = "submit" class = "btn">Secure Vehicle</button>
        </form>
    </div>
</body>
</html>
